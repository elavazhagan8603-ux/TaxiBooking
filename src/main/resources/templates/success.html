<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | CityCab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root { --taxi-yellow: #FFCC00; --dark-gray: #1A1A1A; }

        body {
            background: linear-gradient(145deg, #f0f2f5, #e9ecef);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .success-card {
            background: #ffffff;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 10px solid #28a745;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: #e8f5e9;
            color: #28a745;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 3rem;
            margin: 0 auto 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-home {
            background-color: var(--dark-gray);
            color: var(--taxi-yellow);
            font-weight: 700;
            padding: 14px 35px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background-color: #000;
            color: #fff;
            transform: scale(1.05);
        }

        .progress { background: #f0f0f0; border-radius: 10px; }
    </style>
</head>

<body>

    <div class="success-card">
        <div class="icon-circle">
            <i class="fa-solid fa-check"></i>
        </div>
        
        <h2 class="fw-bold">Booking Confirmed!</h2>
        <p class="text-muted mt-2">
            Your <strong class="text-dark" th:text="${rideType}">Ride</strong> request has been successfully submitted.
        </p>

        <div class="mt-4">
            <p class="small text-muted mb-2">Redirecting to Dashboard...</p>
            <div class="progress" style="height: 6px;">
                <div class="progress-bar bg-success" role="progressbar"
                     style="width: 100%; transition: width 5s linear;"></div>
            </div>
        </div>

        <a th:href="@{/bookinghome}" class="btn-home">
            <i class="fa-solid fa-arrow-left me-2"></i>Back to Dashboard
        </a>
    </div>
    
  

    <script>
        // Redirect after 5 seconds
        setTimeout(function () {
            window.location.href = '/bookinghome';
        }, 3000);
    </script>
</body>

</html>
