<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Rental | Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1e1e2d;
            --taxi-yellow: #FFCC00;
            --main-bg: #f5f6fa;
            --text-muted: #a2a3b7;
        }

        body {
            background-color: var(--main-bg);
            font-family: 'Segoe UI', sans-serif;
        }

        .sidebar {
            height: 100vh;
            width: 260px;
            position: fixed;
            background: var(--sidebar-bg);
            color: var(--text-muted);
            padding-top: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .brand-box {
            padding: 20px;
            text-align: center;
            color: var(--taxi-yellow);
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .nav-link {
            color: var(--text-muted);
            padding: 15px 25px;
            display: block;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #2b2b40;
            color: #fff;
            border-left: 4px solid var(--taxi-yellow);
        }

        .main-content {
            margin-left: 260px;
            padding: 40px;
        }

        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            padding: 30px;
            background: #fff;
        }

        .form-label {
            font-weight: 600;
            color: #444;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .btn-taxi {
            background-color: var(--taxi-yellow);
            border: none;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-taxi:hover {
            background-color: #e6b800;
            transform: translateY(-2px);
        }

        #preview-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            display: none;
            margin-top: 15px;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="brand-box">
            <h4><i class="fa-solid fa-taxi"></i> City Cab | Reliable Riders</h4>
            <small class="text-uppercase">Administrator</small>
        </div>
        <a class="nav-link" th:href="@{/admin/adminhome}"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
        <a class="nav-link" th:href="@{/admin/driver-approvals}"><i class="fa-solid fa-user-check me-2"></i> Driver
            Approvals</a>
        <a class="nav-link" th:href="@{/admin/rental-approvals}"><i class="fa-solid fa-car-side me-2"></i> Rental
            Requests</a>
        <a class="nav-link active" th:href="@{/admin/add-rental}"><i class="fa-solid fa-plus-circle me-2"></i> Add
            Rental Car</a>
        <div class="mt-5 px-4">
            <a class="btn btn-outline-danger w-100" th:href="@{/admin-logout}"><i
                    class="fa-solid fa-right-from-bracket me-2"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Add New Rental Vehicle</h2>
            <a th:href="@{/admin/adminhome}" class="btn btn-outline-secondary"><i
                    class="fa-solid fa-arrow-left me-2"></i> Back</a>
        </div>

        <div class="card">
            <form th:action="@{/admin/add-rental}" th:object="${rentalmodel}" method="post">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Car Name</label>
                            <input type="text" th:field="*{carName}" class="form-control"
                                placeholder="e.g. Toyota Innova" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Car Type</label>
                            <select th:field="*{carType}" class="form-select" required>
                                <option value="Sedan">Sedan</option>
                                <option value="SUV">SUV</option>
                                <option value="Luxury">Luxury</option>
                                <option value="Hatchback">Hatchback</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price Per Day (₹)</label>
                            <input type="number" th:field="*{pricePerDay}" class="form-control" placeholder="0"
                                required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Select Car Image</label>
                            <select th:field="*{imageUrl}" id="car-select" class="form-select"
                                onchange="previewLocalImage()" required>
                                <option value="" disabled selected>-- Choose a model image --</option>
                                <option value="innova.jpg">Toyota Innova</option>
                                <option value="swift.jpg">Maruti Swift</option>
                                <option value="creta.jpg">Hyundai Creta</option>
                                <option value="fortuner.jpg">Toyota Fortuner</option>
                            </select>
                            <img id="preview-img" src="#" alt="Preview">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-taxi btn-lg mt-3">Publish to Inventory</button>
            </form>
        </div>
    </div>

    <script>
        function previewLocalImage() {
            const select = document.getElementById('car-select');
            const img = document.getElementById('preview-img');
            if (select.value) {
                img.src = '/image/' + select.value;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }
    </script>
</body>

</html>
