<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Driver Approvals | SwiftRide Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --dark-gray: #2d3436;
            --taxi-yellow: #FFCC00;
            --sidebar-bg: #1e1e2d;
        }

        body {
            background-color: #f5f6fa;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 260px;
            position: fixed;
            background: var(--sidebar-bg);
            color: #a2a3b7;
            padding-top: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .brand-box {
            padding: 20px;
            text-align: center;
            color: var(--taxi-yellow);
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .nav-link {
            color: #a2a3b7;
            padding: 15px 25px;
            display: block;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #2b2b40;
            color: #fff;
            border-left: 4px solid var(--taxi-yellow);
        }

        /* Content Area */
        .main-content {
            margin-left: 260px;
            padding: 40px;
        }

        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        /* Table */
        .table thead {
            background-color: #f8f9fa;
            color: #333;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Buttons */
        .btn-approve {
            background-color: #27ae60;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-approve:hover {
            background-color: #219150;
            color: white;
            transform: scale(1.05);
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background-color: #c0392b;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="brand-box">
            <h4><i class="fa-solid fa-taxi"></i>CityCab |  Reliable Riders</h4>
            <small class="text-uppercase">Administrator</small>
        </div>
        <a class="nav-link" th:href="@{/admin/adminhome}"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
        <a class="nav-link active" th:href="@{/admin/driver-approvals}"><i class="fa-solid fa-user-check me-2"></i>
            Driver Approvals</a>
        <a class="nav-link" th:href="@{/admin/rental-approvals}"><i class="fa-solid fa-car-side me-2"></i> Rental
            Requests</a>
        <a class="nav-link" th:href="@{/admin/add-rental}"><i class="fa-solid fa-plus-circle me-2"></i> Add
            Rental Car</a>
        <div class="mt-5 px-4">
            <a class="btn btn-outline-danger w-100" th:href="@{/admin-logout}"><i
                    class="fa-solid fa-right-from-bracket me-2"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Driver Approvals</h2>
            <a th:href="@{/admin/adminhome}" class="btn btn-outline-secondary"><i
                    class="fa-solid fa-arrow-left me-2"></i> Back to
                Dashboard</a>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Driver Name</th>
                            <th>License Number</th>
                            <th>Phone</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${drivers.empty}">
                            <td colspan="4" class="text-center py-5 text-muted">No pending approvals at the moment.</td>
                        </tr>
                        <tr th:each="d : ${drivers}">
                            <td class="ps-4 fw-bold" th:text="${d.name}">Name</td>
                            <td th:text="${d.licence}">License</td>
                            <td th:text="${d.phone}">Phone</td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2">
                                    <form th:action="@{/admin/approve-driver/{id}(id=${d.id})}" method="post">
                                        <button type="submit" class="btn btn-approve btn-sm px-3">
                                            <i class="fa-solid fa-check"></i> Approve
                                        </button>
                                    </form>
                                    <!-- <form th:action="@{/admin/delete-driver/{id}(id=${d.id})}" method="post" -->
                                        <!-- onsubmit="return confirm('Are you sure you want to delete this driver?');"> -->
                                        <!-- <button type="submit" class="btn btn-delete btn-sm px-3"> -->
                                            <!-- <i class="fa-solid fa-trash"></i> Delete -->
                                        <!-- </button> -->
                                    <!-- </form> -->
                                <!-- </div> -->
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/js/bootstrap.bundle.min.js"></script>
</body>

</html>
